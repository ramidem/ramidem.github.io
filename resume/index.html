<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Med Aduh | Resume</title>
  <meta name="description" content="Public resume for Med Aduh, focused on full-stack product engineering, backend systems, and operational software.">
  <link rel="canonical" href="https://ramidem.github.io/resume/">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/icons/favicon-32x32.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page-shell">
    <div class="resume-toolbar no-print" aria-label="Resume actions">
      <details class="toolbar-contact">
        <summary>Message</summary>
        <div class="toolbar-contact-panel">
          <h2>Message Med</h2>
          <p><a href="mailto:im.ramidem@gmail.com">im.ramidem@gmail.com</a></p>
          <form class="message-form" action="mailto:im.ramidem@gmail.com" method="post" enctype="text/plain">
            <div class="field-grid">
              <label>
                Name
                <input name="name" autocomplete="name">
              </label>
              <label>
                Email
                <input name="email" type="email" autocomplete="email">
              </label>
            </div>
            <label>
              Message
              <textarea name="message"></textarea>
            </label>
            <button class="icon-button primary" type="submit">Open email draft</button>
          </form>
        </div>
      </details>
      <button class="icon-button" type="button" data-print>Print / Save PDF</button>
      <a class="icon-button" href="data.js">Data</a>
    </div>

    <section class="resume-paper" aria-label="Resume">
      <header class="resume-header">
        <h1 data-name>Med Aduh</h1>
        <p class="headline-line" data-headline></p>
        <p class="contact-line" data-contact></p>
      </header>

      <section class="resume-section focus-panel no-print" aria-labelledby="focus">
        <h2 id="focus">Focus</h2>
        <p class="entry-summary" data-focus-summary></p>
        <div class="focus-buttons" data-lenses></div>
      </section>

      <section class="resume-section" aria-labelledby="summary">
        <h2 id="summary">Summary</h2>
        <p class="entry-summary" data-summary></p>
      </section>

      <section class="resume-section" aria-labelledby="experience">
        <h2 id="experience">Experience</h2>
        <div class="entry-list" data-experience></div>
      </section>

      <section class="resume-section skills" aria-labelledby="skills">
        <h2 id="skills">Skills &amp; Interests</h2>
        <dl data-skills></dl>
      </section>

      <details class="resume-section extended-records no-print">
        <summary>Extended project records</summary>
        <p class="entry-summary">
          Additional public-safe project records are kept here for review, but are not part of the default resume.
        </p>
        <div class="entry-list" data-projects></div>
      </details>
    </section>
  </main>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
